 <!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>
<body>
    <h2>Simple Calculator</h2>
    <p id="output"></p>

    <script>
        function calculator(num1, num2, operator) {
            if (operator == "+") {
                return num1 + num2;
            } else if (operator == "-") {
                return num1 - num2;
            } else if (operator == "*") {
                return num1 * num2;
            } else if (operator == "/") {
                return num1 / num2;
            } else {
                return "Invalid operator";
            }
        }

        let result = calculator(10, 5, "+");
        document.getElementById("output").innerHTML = "Result: " + result;
    </script>
</body>
</html>
